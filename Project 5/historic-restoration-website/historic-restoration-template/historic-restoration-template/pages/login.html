<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to HeritageCraft Client Portal">
  <title>Login | HeritageCraft</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { display: ['Crimson Pro','serif'], body: ['Manrope','sans-serif'] }, colors: { primary: '#D4745B', secondary: '#E8B464', accent: '#2C3E50', background: 'var(--color-background)', surface: 'var(--color-surface)', 'surface-elevated': 'var(--color-surface-elevated)', border: 'var(--color-border)' },
          textColor: {
            primary: 'var(--color-text-primary)',
            secondary: 'var(--color-text-secondary)',
            tertiary: 'var(--color-text-tertiary)',
            inverse: 'var(--color-text-inverse)',
          } } }
    }
  </script>
  <style>
    .auth-bg {
      background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=2000');
      background-size: cover;
      background-position: center;
    }
    .glass-box {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    [data-theme="dark"] .glass-box {
      background: rgba(26, 26, 26, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--color-border);
      transition: all 0.3s ease;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .social-btn:hover { background: var(--color-surface-elevated); transform: translateY(-2px); }
  </style>
</head>
<body class="font-body bg-background transition-colors duration-300 min-h-screen flex items-center justify-center p-4 auth-bg relative">

  <div class="max-w-md w-full glass-box rounded-[2.5rem] p-8 sm:p-12 shadow-2xl animate-fade-in-up relative">
    <!-- Header with Toggles -->
    <div class="flex justify-between items-center mb-8">
      <a href="../index.html" class="flex items-center gap-3 group px-2 py-1 rounded-xl hover:bg-surface-elevated transition-all">
        <div class="w-10 h-10 flex items-center justify-center transform group-hover:scale-105 transition-transform overflow-hidden">
          <img src="../assets/logo.png" alt="HeritageCraft Logo" class="w-full h-full object-contain">
        </div>
        <div class="flex flex-col">
          <span class="font-display font-bold text-lg leading-tight">Heritage<span class="text-primary">Craft</span></span>
          <span class="text-[10px] text-tertiary uppercase tracking-widest font-black leading-none">Since 1985</span>
        </div>
      </a>
      <div class="flex items-center gap-2">
        <button id="dir-toggle" class="w-8 h-8 rounded-lg hover:bg-surface-elevated transition-colors flex items-center justify-center text-xs font-semibold">LTR</button>
        <button id="theme-toggle" class="w-8 h-8 rounded-lg hover:bg-surface-elevated transition-all flex items-center justify-center">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

      <h1 class="text-3xl font-display font-bold mb-2">Welcome Back</h1>
      <p class="text-secondary text-sm">Access your preservation projects and digital archives.</p>

    <!-- Social Login Section -->
    <div class="space-y-3 mb-8">
      <button class="social-btn w-full">
        <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <div class="grid grid-cols-2 gap-3">
        <button class="social-btn">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
          GitHub
        </button>
        <button class="social-btn">
          <svg class="w-5 h-5 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
      </div>
    </div>

    <div class="relative flex items-center mb-8">
      <div class="flex-grow border-t border-border"></div>
      <span class="flex-shrink mx-4 text-tertiary text-xs font-bold uppercase tracking-widest">or email</span>
      <div class="flex-grow border-t border-border"></div>
    </div>

    <form class="space-y-6">
      <div>
        <label class="block text-xs font-black uppercase tracking-widest text-secondary mb-2" for="email">Email Address</label>
        <input type="email" id="email" class="w-full px-5 py-4 rounded-xl bg-surface-elevated border border-border focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm" placeholder="archivist@heritagecraft.com">
      </div>
      <div>
        <label class="block text-xs font-black uppercase tracking-widest text-secondary mb-2" for="password">Password</label>
        <input type="password" id="password" class="w-full px-5 py-4 rounded-xl bg-surface-elevated border border-border focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-sm mb-2" placeholder="••••••••">
        <div class="flex justify-end">
          <a href="#" class="text-xs font-bold text-primary hover:underline italic">forgot password</a>
        </div>
      </div>
      <button type="submit" class="btn-primary w-full py-5 text-sm font-black tracking-widest uppercase shadow-xl hover:shadow-primary/20">Sign In to Dashboard</button>
    </form>

    <p class="text-center mt-10 text-sm text-secondary">
      New to HeritageCraft? <a href="signup.html" class="text-primary font-black hover:underline uppercase tracking-tight">Create an Account</a>
    </p>
  </div>

  <script src="../assets/js/main.js"></script>
</body>
</html>
