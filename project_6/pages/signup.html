<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join the Collective — Adventure Film & Photography Collective</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css" />
  <link rel="icon" type="image/png" href="../assets/logo.png">
  
  <script>
    (function(){
      const saved = localStorage.getItem('afpc-theme');
      const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
</head>
<body class="auth-page">

<div class="cursor-glow" aria-hidden="true"></div>


<main class="auth-container">
  <div class="auth-box reveal">
    <div class="auth-header">
      <a href="../index.html" style="display:inline-block; margin-bottom:24px;">
        <img src="../assets/logo.png" alt="AFPC Logo" style="height:64px; width:auto; margin:0 auto;">
      </a>
      <span class="overline" style="display:block;">Create Account</span>
      <h1 class="display-sm" style="margin-top:12px;">Join the Collective</h1>
      <p style="color:var(--text-muted); margin-top:8px; font-size:0.9rem;">Become part of a world-class network of expedition filmmakers and photographers.</p>
    </div>

    <form class="auth-form" onsubmit="return false;">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
        <div class="form-group">
          <label class="form-label" for="first-name">First Name</label>
          <input type="text" id="first-name" class="form-input" placeholder="Marcus" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="last-name">Last Name</label>
          <input type="text" id="last-name" class="form-input" placeholder="Veld" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="name@company.com" required />
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Create Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required />
        <p style="font-size:0.7rem; color:var(--text-muted); margin-top:6px;">Minimum 8 characters with at least one number.</p>
      </div>

      <div style="display:flex; align-items:flex-start; gap:10px; margin-bottom:24px;">
        <input type="checkbox" id="terms" required style="width:16px; height:16px; margin-top:3px; accent-color:var(--accent1);" />
        <label for="terms" style="font-size:0.82rem; color:var(--text-secondary); line-height:1.5; cursor:pointer;">
          I agree to the <a href="#" style="color:var(--accent1);">Terms of Service</a> and <a href="#" style="color:var(--accent1);">Privacy Policy</a>.
        </label>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:14px;">
        Create Account
      </button>

      <div class="auth-divider">
        <span>Or sign up with</span>
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
        <button type="button" class="btn btn-outline" style="font-size:0.75rem; padding:10px; border-color:var(--border); color:var(--text-primary); display:flex; align-items:center; justify-content:center; gap:8px;">
          <svg style="width:16px; height:16px;" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button type="button" class="btn btn-outline" style="font-size:0.75rem; padding:10px; border-color:var(--border); color:var(--text-primary); display:flex; align-items:center; justify-content:center; gap:8px;">
          <svg style="width:16px; height:16px;" viewBox="0 0 256 315" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid"><path d="M213.803 167.03c.442 47.58 41.74 63.413 42.147 63.615-.35 1.03-6.585 22.593-21.842 44.823-13.18 19.204-26.85 38.307-48.423 38.69-21.196.386-27.994-12.525-52.274-12.525-24.264 0-31.815 12.13-52.273 12.91-20.897.772-36.733-20.73-50.04-39.855-27.185-39.065-47.935-110.375-19.986-158.895 13.844-24.086 38.643-39.317 65.417-39.71 20.403-.385 39.638 13.734 52.128 13.734 12.483 0 35.834-16.892 60.59-14.364 10.387.427 39.55 4.154 58.267 31.545-1.488.924-34.887 20.32-34.502 60.04zM173.842 48.012c11.026-13.27 18.424-31.728 16.4-50.198-15.845.642-35.01 10.518-46.362 23.77-10.187 11.756-19.1 30.63-16.735 48.653 17.65 1.366 35.666-8.956 46.697-22.225z" fill="currentColor"/></svg>
          Apple
        </button>
      </div>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="signin.html" style="color:var(--accent1); font-weight:600;">Sign In</a></p>
    </div>
  </div>
</main>

<style>
  .auth-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    background-image: radial-gradient(circle at 50% -20%, rgba(34, 211, 238, 0.05), transparent);
  }
  .auth-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }
  .auth-box {
    width: 100%;
    max-width: 480px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 48px;
    box-shadow: var(--shadow-xl);
  }
  .auth-header {
    text-align: center;
    margin-bottom: 40px;
  }
  .auth-divider {
    position: relative;
    text-align: center;
    margin: 32px 0;
  }
  .auth-divider::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--border);
    z-index: 0;
  }
  .auth-divider span {
    position: relative;
    background: var(--surface2);
    padding: 0 16px;
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .auth-footer {
    margin-top: 32px;
    text-align: center;
    font-size: 0.88rem;
    color: var(--text-muted);
  }
</style>

<footer style="padding: 24px 0; text-align:center; font-size:0.75rem; color:var(--text-muted); border-top: 1px solid var(--border);">
  <div class="container">
    <p>© 2026 Adventure Film & Photography Collective. All rights reserved.</p>
  </div>
</footer>

<script src="../assets/js/main.js"></script>
</body>
</html>
