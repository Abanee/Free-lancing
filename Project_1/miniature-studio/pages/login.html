<!doctype html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Miniature Studio</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { display: ["Bebas Neue", "sans-serif"], body: ["Space Grotesk", "sans-serif"] } } }
    };
  </script>
  <script>
    (() => {
      try {
        const theme = localStorage.getItem("studio-theme");
        const direction = localStorage.getItem("studio-dir");
        if (theme) document.documentElement.setAttribute("data-theme", theme);
        if (direction) document.documentElement.setAttribute("dir", direction);
      } catch (_) { }
    })();
  </script>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <script src="../assets/js/main.js" defer></script>
</head>

<body
  class="font-body text-[var(--color-text)] min-h-screen flex flex-col bg-[#fffaf3] bg-[url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center">
  <div class="absolute inset-0 bg-[#fffaf3]/80 backdrop-blur-sm"></div>
  <main class="flex-1 flex items-center justify-center p-4 relative z-10">
    <div class="w-full max-w-md bg-white/90 backdrop-blur-xl border border-black/10 rounded-3xl p-8 card-shadow"
      data-reveal>
      <div class="text-center mb-8">
        <a href="../index.html" class="inline-block mb-4 group">
          <img src="../assets/images/logo.png" alt="Miniature Studio Logo"
            class="h-16 w-auto mx-auto object-contain drop-shadow-[0_0_6px_rgba(252,211,77,0.9)] group-hover:drop-shadow-[0_0_15px_rgba(252,211,77,1)] transition-all duration-300">
        </a>
        <h1 class="font-display text-4xl text-[var(--color-primary)] mb-2">Welcome Back</h1>
        <p class="text-[var(--color-muted)] text-sm">Enter your details to access your studio profile</p>
      </div>

      <form class="space-y-4" onsubmit="event.preventDefault(); window.location.href='dashboard-profile.html';">
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-[var(--color-muted)] mb-2">Email
            Address</label>
          <input type="email" placeholder="collector@example.com"
            class="w-full px-4 py-3 rounded-2xl border border-black/10 focus:border-[var(--color-accent)] focus:outline-none transition-colors bg-white/50"
            required>
        </div>
        <div>
          <label
            class="block text-xs font-bold uppercase tracking-widest text-[var(--color-muted)] mb-2">Password</label>
          <input type="password" placeholder="••••••••"
            class="w-full px-4 py-3 rounded-2xl border border-black/10 focus:border-[var(--color-accent)] focus:outline-none transition-colors bg-white/50"
            required>
        </div>
        <div class="flex items-center justify-between text-xs">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="rounded border-black/10 text-[var(--color-accent)]">
            <span>Remember me</span>
          </label>
          <a href="#" class="text-[var(--color-accent)] font-bold hover:underline">Forgot password?</a>
        </div>
        <button type="submit" class="w-full btn-primary py-4 mt-4">Login to Studio</button>
      </form>

      <div class="mt-6 flex items-center justify-center gap-4">
        <div class="h-px bg-black/10 flex-1"></div>
        <span class="text-xs text-[var(--color-muted)] uppercase tracking-wider font-bold">Or continue with</span>
        <div class="h-px bg-black/10 flex-1"></div>
      </div>

      <div class="mt-6 grid grid-cols-2 gap-4">
        <button
          class="flex items-center justify-center gap-2 py-3 px-4 rounded-2xl border border-black/10 hover:bg-black/5 transition-colors text-sm font-semibold">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="currentColor"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          Google
        </button>
        <button
          class="flex items-center justify-center gap-2 py-3 px-4 rounded-2xl border border-black/10 hover:bg-black/5 transition-colors text-sm font-semibold">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path fill-rule="evenodd"
              d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
              clip-rule="evenodd" />
          </svg>
          GitHub
        </button>
      </div>

      <div class="mt-8 pt-8 border-t border-black/5 text-center">
        <p class="text-sm text-[var(--color-muted)]">Don't have an account?
          <a href="register.html" class="text-[var(--color-accent)] font-bold hover:underline">Register now</a>
        </p>
      </div>
    </div>
  </main>
</body>

</html>
