<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Off-Grid Cabin Rentals — Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="assets/images/logo.png" type="image/png" />
</head>

<body class="bg-stone-950 text-stone-100 font-sans min-h-screen flex flex-col pt-24">


    <main class="flex-grow flex items-center justify-center p-6 text-stone-100">
        <div class="w-full max-w-md bg-stone-900 border border-stone-800 rounded-2xl p-8 lg:p-12 shadow-2xl">
            <div class="flex justify-center mb-8">
                <a href="index.html" class="logo flex items-center gap-2">
                    <img src="assets/images/logo.png" alt="OffGrid Logo" class="h-10 w-auto" />
                    <span class="text-2xl font-display font-bold tracking-tight text-amber-400">OffGrid<span
                            class="text-stone-100">.</span></span>
                </a>
            </div>
            <h2 class="text-3xl font-display font-bold text-center mb-6">Create Account</h2>

            <form class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-stone-400 mb-2">Full Name</label>
                    <input type="text"
                        class="w-full bg-stone-950 border border-stone-700 rounded-lg px-4 py-3 text-stone-100 focus:outline-none focus:border-amber-400 transition"
                        placeholder="John Doe" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-400 mb-2">Email Address</label>
                    <input type="email"
                        class="w-full bg-stone-950 border border-stone-700 rounded-lg px-4 py-3 text-stone-100 focus:outline-none focus:border-amber-400 transition"
                        placeholder="you@example.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-400 mb-2">Password</label>
                    <div class="relative">
                        <input type="password" id="password"
                            class="w-full bg-stone-950 border border-stone-700 rounded-lg px-4 py-3 text-stone-100 focus:outline-none focus:border-amber-400 transition pr-12"
                            placeholder="••••••••" required>
                        <button type="button" onclick="togglePassword('password', 'eye-icon')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-stone-500 hover:text-amber-400 transition-colors focus:outline-none">
                            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit"
                    class="w-full py-4 bg-amber-500 text-stone-950 rounded-xl font-bold hover:bg-amber-400 transition shadow-lg shadow-amber-500/10">
                    Create Account
                </button>
            </form>

            <div class="mt-8 flex items-center">
                <div class="w-full border-t border-stone-700"></div>
                <span class="px-4 text-sm text-stone-500 uppercase tracking-wider">Or</span>
                <div class="w-full border-t border-stone-700"></div>
            </div>

            <div class="mt-8 space-y-4 text-center text-stone-100">
                <button
                    class="social-btn w-full flex items-center justify-center gap-3 py-3 border border-stone-700 rounded-lg hover:bg-stone-800 transition">
                    <svg class="w-5 h-5 text-stone-100" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z" />
                    </svg>
                    Sign Up with Google
                </button>
                <button
                    class="social-btn w-full flex items-center justify-center gap-3 py-3 border border-stone-700 rounded-lg hover:bg-stone-800 transition font-medium">
                    <svg class="w-5 h-5 text-stone-100" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M17.05 20.28c-.96.95-2.12 1.72-3.13 1.72-1.01 0-1.28-.62-2.3-.62s-1.34.62-2.3.62c-1.02 0-2.31-.81-3.35-1.84-2.14-2.14-2.77-6.08-1.57-8.15 1.13-1.95 3.12-3.04 4.88-3.04 1.11 0 2 0.61 2.65 0.61.64 0 1.63-.73 2.87-.73 1.4 0 2.92.83 3.73 1.93-2.61 1.54-2.19 5.37.54 6.64-.67 1.63-1.46 2.86-2.02 3.86zM15.42 5.8c-.8-1.01-1.31-2.43-.88-3.8 1.18.14 2.5 0.81 3.2 1.61.76.85 1.34 2.21 1.01 3.51-1.3.17-2.58-.35-3.33-1.32z" />
                    </svg>
                    Sign Up with Apple
                </button>
            </div>

            <p class="mt-8 text-center text-stone-500 text-sm">
                Already have an account? <a href="login.html"
                    class="text-amber-500 font-medium hover:text-amber-700 transition">Sign In</a>
            </p>
        </div>
    </main>

    <script>
        function togglePassword(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const eyeIcon = document.getElementById(iconId);
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            // Change icon inner path
            if (type === 'password') {
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            } else {
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.059 10.059 0 014.504-5.903M15.223 15.223A3 3 0 0012 9.071m2.771 2.771l3.464 3.464M18.825 5.175A10.05 10.05 0 0121.542 12a10.057 10.057 0 01-4.504 5.903M3 3l18 18" />`;
            }
        }
    </script>
    <script src="js/main.js"></script>
</body>

</html>
