<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Off-Grid Cabin Rentals — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="assets/images/logo.png" type="image/png" />
</head>

<body class="bg-stone-950 text-stone-100 font-sans min-h-screen flex flex-col pt-24">


    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-stone-900 border border-stone-800 rounded-2xl p-8 lg:p-12 shadow-2xl">
            <div class="flex justify-center mb-8">
                <a href="index.html" class="logo flex items-center gap-2">
                    <img src="assets/images/logo.png" alt="OffGrid Logo" class="h-10 w-auto" />
                    <span class="text-2xl font-display font-bold tracking-tight text-amber-400">OffGrid<span
                            class="text-stone-100">.</span></span>
                </a>
            </div>
            <h2 class="text-3xl font-display font-bold text-center mb-8">Welcome Back</h2>

            <form class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-stone-400 mb-2">Email Address</label>
                    <input type="email"
                        class="w-full bg-stone-950 border border-stone-700 rounded-lg px-4 py-3 text-stone-100 focus:outline-none focus:border-amber-400 transition"
                        placeholder="you@example.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-400 mb-2">Password</label>
                    <input type="password"
                        class="w-full bg-stone-950 border border-stone-700 rounded-lg px-4 py-3 text-stone-100 focus:outline-none focus:border-amber-400 transition"
                        placeholder="••••••••" required>
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center text-sm text-stone-400 cursor-pointer">
                        <input type="checkbox" class="mr-2 accent-amber-500"> Remember me
                    </label>
                    <a href="#" class="text-sm text-amber-500 hover:text-amber-400 transition">Forgot Password?</a>
                </div>
                <button type="button" onclick="window.location.href='dashboard.html#account'"
                    class="w-full py-3.5 bg-amber-500 text-stone-950 rounded-lg font-bold hover:bg-amber-400 transition mt-2">Sign
                    In</button>
            </form>

            <div class="mt-8 flex items-center">
                <div class="w-full border-t border-stone-700"></div>
                <span class="px-4 text-sm text-stone-500 uppercase tracking-wider">Or</span>
                <div class="w-full border-t border-stone-700"></div>
            </div>

            <div class="mt-8 space-y-4 text-center text-stone-100">
                <button
                    class="social-btn w-full flex items-center justify-center gap-3 py-3 border border-stone-700 rounded-lg hover:bg-stone-800 transition">
                    <svg class="w-5 h-5 text-stone-100" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z" />
                    </svg>
                    Continue with Google
                </button>
                <button
                    class="social-btn w-full flex items-center justify-center gap-3 py-3 border border-stone-700 rounded-lg hover:bg-stone-800 transition">
                    <svg class="w-5 h-5 text-stone-100" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12,2C6.477,2,2,6.477,2,12c0,4.418,2.865,8.166,6.839,9.489c0.5,0.092,0.682-0.217,0.682-0.482c0-0.237-0.008-0.866-0.013-1.7c-2.782,0.604-3.369-1.34-3.369-1.34c-0.454-1.155-1.11-1.462-1.11-1.462c-0.908-0.62,0.069-0.608,0.069-0.608c1.003,0.07,1.531,1.03,1.531,1.03c0.892,1.529,2.341,1.087,2.91,0.831c0.092-0.646,0.35-1.086,0.636-1.336c-2.22-0.253-4.555-1.11-4.555-4.943c0-1.091,0.39-1.984,1.029-2.683c-0.103-0.253-0.446-1.27,0.098-2.647c0,0,0.84-0.269,2.75,1.025C11.548,5.536,12.396,5.433,13,5.432c0.604,0.001,1.452,0.104,2.25,0.33c1.908-1.294,2.748-1.025,2.748-1.025c0.546,1.377,0.203,2.394,0.1,2.647c0.64,0.699,1.028,1.592,1.028,2.683c0,3.842-2.338,4.687-4.566,4.935c0.359,0.309,0.678,0.919,0.678,1.852c0,1.336-0.012,2.415-0.012,2.743c0,0.267,0.18,0.578,0.688,0.48C19.138,20.161,22,16.416,22,12C22,6.477,17.523,2,12,2z" />
                    </svg>
                    Continue with GitHub
                </button>
                <button
                    class="social-btn w-full flex items-center justify-center gap-3 py-3 border border-stone-700 rounded-lg hover:bg-stone-800 transition">
                    <svg class="w-5 h-5 text-stone-100" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12,2C6.477,2,2,6.477,2,12c0,4.991,3.657,9.128,8.438,9.879V15.398h-2.54V12h2.54V9.412c0-2.508,1.493-3.89,3.776-3.89c1.094,0,2.238,0.195,2.238,0.195v2.46h-1.26c-1.242,0-1.63,0.771-1.63,1.563V12h2.773l-0.443,3.398h-2.33V21.88C18.343,21.128,22,16.991,22,12C22,6.477,17.523,2,12,2z" />
                    </svg>
                    Continue with Facebook
                </button>
            </div>

            <p class="mt-8 text-center text-stone-500 text-sm">
                Don't have an account? <a href="signup.html"
                    class="text-amber-500 font-medium hover:text-amber-400">Sign Up</a>
            </p>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>

</html>
