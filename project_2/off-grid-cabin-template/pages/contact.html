<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Off-Grid Rentals</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div class="container mx-auto px-4 py-20">
        <h1 class="text-4xl font-bold mb-8">Contact Us</h1>
        <form class="max-w-2xl space-y-4">
            <input type="text" placeholder="Name" class="w-full px-4 py-3 rounded-lg border">
            <input type="email" placeholder="Email" class="w-full px-4 py-3 rounded-lg border">
            <textarea placeholder="Message" rows="5" class="w-full px-4 py-3 rounded-lg border"></textarea>
            <button type="submit" class="px-6 py-3 bg-green-700 text-white rounded-lg">Send Message</button>
        </form>
        <a href="../index.html" class="inline-block mt-8 text-green-700">Back to Home</a>
    </div>
</body>
</html>
